spring:
  application:
    name: workout

  datasource:
    url: jdbc:mysql://localhost:3306/workout_db?useSSL=false&serverTimezone=UTC
    username: ${MYSQL_USER:workout_user}
    password: ${MYSQL_PASSWORD:lift123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  security:
    user:
      name: admin
      password: admin
